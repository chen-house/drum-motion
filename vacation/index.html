<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>雪人的假期</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  html,body{margin:0;padding:0;background:#cfeaf5;height:100%;overflow:hidden}
  canvas{display:block;margin:0 auto}
</style>
</head>
<body>
<script>
// ============ 参数区(极简:只有底鼓 + 躺椅) ============
const W=720,H=1280;
const SNOWLINE=150;
const CX=360, CY=720;         // 构图中心(主体居中偏上)
// 3/4 帆布躺椅骨架(后高右、前低左)
const SEAT_F={x:CX-186, y:CY+150};   // 座前沿
const SEAT_H={x:CX+70,  y:CY+70};    // 座/靠背铰接
const BACK_T={x:CX+186, y:CY-150};   // 靠背顶
const BODY={x:CX-6, y:CY+30, r:150}; // 底鼓(躺着的身子)
// =====================================================
let S=1,t0=0,snow=[],sparkle=[],drips=[];
function setup(){const s=min(windowWidth/W,windowHeight/H);S=s;createCanvas(W*s,H*s);frameRate(60);reset();}
function reset(){t0=millis()/1000;drips=[];randomSeed(9);
  snow=[];for(let i=0;i<64;i++)snow.push({x:random(W),y:random(SNOWLINE,H),r:random(2,4.5),ph:random(TWO_PI)});
  sparkle=[];for(let i=0;i<50;i++)sparkle.push({x:random(W),y:random(SNOWLINE+40,H),ph:random(TWO_PI)});}
function windowResized(){const s=min(windowWidth/W,windowHeight/H);S=s;resizeCanvas(W*s,H*s);}
function mousePressed(){reset();}
function T(){return millis()/1000-t0;}
function breathe(t){return 1+0.035*sin(t*1.5);}

function draw(){
  scale(S);const t=T(),dt=min(deltaTime/1000,0.05);
  drawSky(t);drawGround(t);
  drawChairBack();      // 椅背在身后
  drawBass(t,dt);       // 底鼓躺着
  drawChairFront();     // 座+前腿压在身前
}

// ---------------- 天空 + 太阳 ----------------
function drawSky(t){
  for(let y=0;y<SNOWLINE+40;y+=6){const k=y/(SNOWLINE+40);
    stroke(lerpColor(color(126,198,232),color(206,235,246),k));strokeWeight(6);line(0,y,W,y);}
  const sx=592,sy=118;noStroke();
  for(let r=180;r>0;r-=12)fill(255,240,150,7),circle(sx,sy,r*2);
  push();translate(sx,sy);stroke(255,232,120,170);strokeWeight(5);
  for(let k=0;k<14;k++){const a=t*0.3+k*TWO_PI/14,L=70+8*sin(t*3+k);line(cos(a)*L,sin(a)*L,cos(a)*(L+24),sin(a)*(L+24));}
  pop();noStroke();fill(255,244,150);circle(sx,sy,104);fill(255,250,205);circle(sx-8,sy-8,76);
  fill(255,255,255,150);ellipse(150,84,120,34);ellipse(120,74,68,26);ellipse(190,78,78,28);
}
// ---------------- 雪地 ----------------
function drawGround(t){
  noStroke();fill(238,245,252);rect(0,SNOWLINE,W,H-SNOWLINE);
  fill(228,238,250);ellipse(120,SNOWLINE+40,460,120);ellipse(600,SNOWLINE+30,520,120);
  fill(248,251,255);ellipse(360,SNOWLINE+92,900,180);
  fill(196,214,236,140);ellipse(520,SNOWLINE+70,300,50);
  randomSeed(3);for(let i=0;i<300;i++){const gx=random(W),gy=random(SNOWLINE+10,H);
    fill(random()<0.5?200:255,random()<0.5?214:255,random()<0.5?236:255,80);rect(gx,gy,2.2,2.2);}
  randomSeed(millis());
  for(const s of sparkle){const a=abs(sin(t*2+s.ph));if(a<0.6)continue;
    stroke(255,255,255,180*(a-0.6)/0.4);strokeWeight(1.2);
    line(s.x-3,s.y,s.x+3,s.y);line(s.x,s.y-3,s.x,s.y+3);}
  noStroke();for(const f of snow){f.y+=(10+f.r*4)*deltaTime/1000;const x=f.x+sin(t*0.6+f.ph)*14;
    fill(255,255,255,180);circle(x,f.y,f.r*1.6);if(f.y>H+6){f.y=SNOWLINE-6;f.x=random(W);}}
  // 躺椅长投影
  fill(150,172,204,80);push();translate(CX+30,CY+210);rotate(-0.26);ellipse(0,0,540,110);pop();
}
// ---------------- 帆布躺椅(3/4) ----------------
function slats(ax,ay,bx,by,wid,n){
  const dx=bx-ax,dy=by-ay,len=sqrt(dx*dx+dy*dy),nx=-dy/len,ny=dx/len;
  for(let i=0;i<n;i++){const u=i/n,v=(i+1)/n;fill(i%2?[249,208,98]:[235,188,78]);
    quad(ax+dx*u+nx*wid,ay+dy*u+ny*wid, ax+dx*v+nx*wid,ay+dy*v+ny*wid,
         ax+dx*v-nx*wid,ay+dy*v-ny*wid, ax+dx*u-nx*wid,ay+dy*u-ny*wid);}
}
function drawChairBack(){
  // 靠背斜框
  stroke(196,148,84);strokeWeight(14);strokeCap(ROUND);noFill();
  line(SEAT_H.x,SEAT_H.y, BACK_T.x,BACK_T.y);
  line(SEAT_H.x-96,SEAT_H.y+18, BACK_T.x-96,BACK_T.y+18);
  line(BACK_T.x,BACK_T.y, BACK_T.x-96,BACK_T.y+18);
  // 靠背帆布
  slats(SEAT_H.x-48,SEAT_H.y+9, BACK_T.x-48,BACK_T.y+9, 58, 6);
  // 后腿(撑向右下)
  stroke(174,130,72);strokeWeight(13);line(SEAT_H.x+2,SEAT_H.y+54, SEAT_H.x+150,CY+230);
}
function drawChairFront(){
  // 座面帆布(前沿→铰接)
  slats(SEAT_F.x,SEAT_F.y, SEAT_H.x-10,SEAT_H.y+14, 54, 6);
  // 前横木
  stroke(196,148,84);strokeWeight(13);strokeCap(ROUND);
  line(SEAT_F.x-10,SEAT_F.y+8, SEAT_F.x+150,SEAT_F.y-40);
  // 前腿(两根撑地)
  stroke(174,130,72);strokeWeight(13);
  line(SEAT_F.x+6,SEAT_F.y+2, SEAT_F.x-40,CY+232);
  line(SEAT_F.x+150,SEAT_F.y-36, SEAT_F.x+186,CY+228);
}
// ---------------- 底鼓(躺着晒太阳) ----------------
function drawBass(t,dt){
  const br=breathe(t);
  if(random()<0.02)drips.push({x:BODY.x+random(-BODY.r*0.6,BODY.r*0.6),y:BODY.y+BODY.r*0.66,age:0});
  push();translate(BODY.x,BODY.y);rotate(radians(-18));scale(1,br);
  const R=BODY.r;noStroke();
  fill(150,180,214);ellipse(0,0,R*2.14,R*2.0);        // 蓝白描边
  fill(126,74,50);ellipse(0,0,R*2.0,R*1.86);          // 木箍
  fill(252,254,255);ellipse(0,0,R*1.72,R*1.58);       // 白鼓面(圆肚子)
  fill(210,222,238,110);ellipse(R*0.34,R*0.3,R*1.1,R*0.9);
  // 墨镜(架在鼓面上沿,朝天)
  fill(34,36,44);ellipse(-R*0.34,-R*0.34,R*0.42,R*0.36);ellipse(R*0.16,-R*0.4,R*0.42,R*0.36);
  stroke(34,36,44);strokeWeight(6);line(-R*0.16,-R*0.36,-R*0.02,-R*0.4);
  line(-R*0.55,-R*0.36,-R*0.7,-R*0.4);line(R*0.37,-R*0.42,R*0.52,-R*0.46);
  noStroke();fill(150,190,225,150);ellipse(-R*0.42,-R*0.4,R*0.12,R*0.08);ellipse(R*0.08,-R*0.46,R*0.12,R*0.08);
  // 微笑 + 腮红(享受)
  noFill();stroke(150,120,90);strokeWeight(4);arc(-R*0.06,R*0.14,R*0.4,R*0.24,0.2,PI-0.2);
  noStroke();fill(240,150,150,150);ellipse(-R*0.66,-R*0.02,R*0.2,R*0.13);ellipse(R*0.5,-R*0.08,R*0.2,R*0.13);
  // 防晒霜两道
  fill(255,255,255,220);ellipse(-R*0.2,R*0.36,R*0.28,R*0.1);ellipse(R*0.2,R*0.5,R*0.3,R*0.1);
  pop();
  // 滴水 + 水洼
  drips=drips.filter(d=>{d.age+=dt;return d.age<1.1;});
  noStroke();for(const d of drips){fill(150,205,235,220*(1-d.age/1.1));ellipse(d.x,d.y+d.age*d.age*440,4,7);}
  fill(150,205,235,110);ellipse(BODY.x-10,CY+186,BODY.r*1.3+10*sin(t),18);
}
</script>
</body>
</html>
