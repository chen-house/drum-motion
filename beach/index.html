<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>海滩雪人 · Vallenato</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  html,body{margin:0;padding:0;background:#0a1128;height:100%;overflow:hidden}
  canvas{display:block;margin:0 auto}
  #ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(6,20,34,.55);color:#fff;font-family:-apple-system,system-ui,sans-serif;z-index:9;cursor:pointer}
  #ov .play{width:96px;height:96px;border-radius:50%;background:#ffd36a;color:#1a2b4a;
      display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 8px 30px rgba(0,0,0,.35)}
  #ov p{margin-top:18px;font-size:17px;letter-spacing:2px;opacity:.92}
</style>
</head>
<body>
<div id="ov"><div class="play">▶</div><p>点击开始 · tap to play</p></div>
<script>
// ================= 参数区 =================
const W=720,H=1280;
const BPM=122, BEAT=60/BPM, FIRST=1.12;   // 音频节拍网格
// 出场/编排时刻(秒,对齐音频)
const E_BASS=1.12, E_SNARE=3.09, E_STICKS=5.05, E_CYM=7.02;
const T_BREAK=8.99;        // 间奏定格
const T_RESUME=10.96;      // 恢复
const T_GATHER=11.5;       // 底鼓归中
const T_HEAD=12.92;        // 军鼓跳上头
const T_HAT=14.89;         // 镲片当帽
const T_ARMS=16.85;        // 鼓棒插成手臂
const T_SHADES=18.4;       // 戴墨镜 + 派对
const GROUND=1010;         // 沙滩线
const SEA=560;             // 海平线
const CX=360, BR=104;      // 雪人中心 / 底鼓半径
const HEADY=GROUND-BR*2-24, HATY=HEADY-30-24;
// ==========================================
let S=1, started=false, seekParam=null;
let grain=[],seaSpark=[],clouds=[],birds=[];

function getParam(k){const m=new RegExp('[?&]'+k+'=([^&]+)').exec(location.search);return m?decodeURIComponent(m[1]):null;}

// ===== Web Audio 引擎(<audio>标签在本环境不可靠,改用 AudioContext 采样级同步) =====
let actx=null, abuf=null, srcNode=null, startAt=0, gainNode=null, wantStart=false, pendingMuted=false, SONGDUR=24.57;
function initAudio(){
  try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){return;}
  gainNode=actx.createGain(); gainNode.connect(actx.destination);
  fetch('colombiaMiEncanto.mp3').then(r=>r.arrayBuffer()).then(b=>actx.decodeAudioData(b))
    .then(x=>{abuf=x;SONGDUR=x.duration;if(wantStart)_go();}).catch(e=>{});
}
function _go(){
  if(!abuf||!actx)return;
  srcNode=actx.createBufferSource();srcNode.buffer=abuf;srcNode.loop=true;
  srcNode.connect(gainNode);gainNode.gain.value=pendingMuted?0:1;
  startAt=actx.currentTime;srcNode.start(0);started=true;
}
function startPlay(muted){
  pendingMuted=!!muted;
  if(actx&&actx.state==='suspended')actx.resume();
  if(abuf)_go(); else wantStart=true;
}

function setup(){
  const s=min(windowWidth/W,windowHeight/H);S=s;
  createCanvas(W*s,H*s);frameRate(60);
  seekParam=getParam('seek'); if(seekParam!==null)seekParam=parseFloat(seekParam);
  const auto=getParam('auto');
  const ov=document.getElementById('ov');
  initAudio();                                                    // 预解码
  if(seekParam!==null){ov.style.display='none';started=true;}     // 调试:静帧
  else if(auto){startPlay(true);ov.style.display='none';}         // 调试:静音自动播放
  else{ov.addEventListener('click',()=>{startPlay(false);ov.style.display='none';});}
  randomSeed(7);
  for(let i=0;i<340;i++)grain.push({x:random(W),y:random(GROUND+2,H),a:random(30,80),d:random()<0.5});
  for(let i=0;i<50;i++)seaSpark.push({x:random(W),y:random(SEA+8,GROUND-8),ph:random(TWO_PI),sp:random(0.6,1.6)});
  for(let i=0;i<3;i++)clouds.push({x:random(W),y:random(120,300),s:random(0.7,1.2),v:random(6,12)});
  for(let i=0;i<4;i++)birds.push({x:random(W),y:random(150,340),ph:random(TWO_PI),v:random(8,16)});
}
function windowResized(){const s=min(windowWidth/W,windowHeight/H);S=s;resizeCanvas(W*s,H*s);}
function mousePressed(){ if(seekParam!==null||!started) return; if(srcNode){try{srcNode.stop();}catch(e){}} _go(); } // 重播
function ez(x){x=constrain(x,0,1);return x*x*(3-2*x);}
function seg(t,a,b){return ez((t-a)/(b-a));}
function hop(u,h){return -4*h*u*(1-u);}
// 主时钟:音频 currentTime(或调试 seek)
function masterT(){ if(seekParam!==null)return seekParam; return (started&&actx)?((actx.currentTime-startAt)%SONGDUR):0; }
// 节拍:每拍一个 0..1(0=刚落拍),beatHit=落拍时=1 衰减
function beatNum(t){return (t-FIRST)/BEAT;}
function beatHit(t,sub){ sub=sub||1; let ph=((beatNum(t)*sub)%1+1)%1; return exp(-5*ph);}
function beatSway(t,perbar){ return sin((beatNum(t)/4)*TWO_PI*(perbar||1)); } // 每小节摆
// 是否在"跳舞窗口"(满格 / 派对)
function dancing(t){ return (t>=FIRST&&t<T_BREAK)||(t>=T_RESUME&&t<T_GATHER)||(t>=T_SHADES); }

// ================== 主循环 ==================
function draw(){
  scale(S);
  const t=masterT();
  drawSky(t); drawSea(t); drawSun(t); drawPalms(t); drawSand(t);
  // 角色(堆好后从下往上:身→头→帽→臂)
  drawBass(t); drawSnare(t); drawCymbal(t); drawStickA(t); drawStickB(t);
  // 派对亮片
  if(t>=T_SHADES){partySparkle(t);}
  // 结束提示(仅调试)
}

// ================= 加勒比背景 =================
function drawSky(t){
  for(let y=0;y<SEA;y+=5){const k=y/SEA;
    stroke(lerpColor(color(78,201,232),color(255,231,176),k));strokeWeight(5);line(0,y,W,y);}
  // 云
  noStroke();
  for(const c of clouds){c.x=(c.x+c.v*deltaTime/1000);if(c.x>W+160)c.x=-160;
    fill(255,255,255,180);
    ellipse(c.x,c.y,150*c.s,54*c.s);ellipse(c.x+58*c.s,c.y-16*c.s,120*c.s,46*c.s);
    ellipse(c.x-58*c.s,c.y-8*c.s,110*c.s,42*c.s);ellipse(c.x+16*c.s,c.y+14*c.s,150*c.s,40*c.s);}
  // 鸟(远处 V)
  stroke(70,90,110,150);strokeWeight(2);noFill();
  for(const b of birds){b.x=(b.x+b.v*deltaTime/1000);if(b.x>W+40)b.x=-40;
    const yy=b.y+sin(t*2+b.ph)*4;
    line(b.x-7,yy,b.x,yy-4);line(b.x,yy-4,b.x+7,yy);}
}
function drawSun(t){
  const sy=180+8*sin(t*0.6);
  noStroke();
  fill(255,236,150,60);circle(560,sy,220);
  fill(255,240,170,90);circle(560,sy,150);
  fill(255,246,196);circle(560,sy,104);
}
function drawSea(t){
  for(let y=SEA;y<GROUND;y+=5){const k=(y-SEA)/(GROUND-SEA);
    stroke(lerpColor(color(56,170,196),color(30,120,150),k));strokeWeight(5);line(0,y,W,y);}
  // 波光横纹(漂动)
  stroke(210,245,250,90);strokeWeight(2);
  for(let i=0;i<10;i++){const yy=SEA+16+i*((GROUND-SEA-20)/10);
    const ph=t*(20+i*4);
    for(let x=-40;x<W;x+=90){const xx=(x+ph)%(W+80)-40;line(xx,yy,xx+42,yy);}}
  // 太阳在海面的倒影
  noStroke();
  for(let i=0;i<6;i++){const yy=SEA+20+i*26;const wob=sin(t*1.6+i)*14;
    fill(255,244,190,70);ellipse(560+wob,yy,60-i*4,6);}
  // 闪点
  for(const s of seaSpark){const a=0.3+0.7*abs(sin(t*2*s.sp+s.ph));
    fill(255,255,255,150*a);circle(s.x,s.y,2.2);}
}
function drawPalms(t){
  drawPalm(70,GROUND+6,1.0,t,0);
  drawPalm(660,GROUND+10,-1.05,t,1.3);
}
function drawPalm(x,base,dir,t,ph){
  push();translate(x,base);
  const sway=radians(4*sin(t*0.9+ph));
  // 树干
  noFill();stroke(120,86,52);strokeWeight(15);
  const topx=dir*40, topy=-330;
  const cx1=dir*6, cy1=-150, cx2=dir*26, cy2=-260;
  push();rotate(sway);
  beginShape();vertex(0,0);bezierVertex(cx1,cy1,cx2,cy2,topx,topy);endShape();
  stroke(150,110,70);strokeWeight(6);
  beginShape();vertex(0,0);bezierVertex(cx1,cy1,cx2,cy2,topx,topy);endShape();
  // 叶
  translate(topx,topy);
  fill(38,120,70);noStroke();
  for(let k=0;k<7;k++){const a=radians(-150+k*42)+sway*0.5;
    push();rotate(a);
    beginShape();vertex(0,0);quadraticVertex(70,-16,140,6);quadraticVertex(70,10,0,6);endShape(CLOSE);
    pop();}
  fill(60,150,90);circle(0,0,16);
  // 椰子
  fill(96,64,40);circle(dir*-8,10,13);circle(dir*8,14,12);
  pop();pop();
}
function drawSand(t){
  noStroke();
  fill(240,220,168);rect(0,GROUND,W,H-GROUND);
  fill(248,232,186);ellipse(200,GROUND+20,520,60);ellipse(560,GROUND+30,520,70);
  // 湿沙(靠海更深)
  fill(214,192,150,150);rect(0,GROUND,W,26);
  // 颗粒
  for(const g of grain){fill(g.d?196:255,g.d?170:250,g.d?120:220,g.a);rect(g.x,g.y,2.2,2.2);}
  // 几个贝壳
  fill(255,214,200);ellipse(150,GROUND+120,26,20);
  fill(210,235,240);ellipse(600,GROUND+150,24,18);
  fill(255,230,180);ellipse(420,GROUND+180,22,16);
}

// ================= 底鼓(身子/白=雪) =================
let bassTheta=0;
function drawBass(t){
  if(t<E_BASS)return;
  let x,rolling=false;
  if(t<E_BASS+1.6){const k=seg(t,E_BASS,E_BASS+1.6);x=lerp(-150,270,k);rolling=true;}       // 滚入
  else if(t<T_GATHER)x=270;
  else{const k=seg(t,T_GATHER,T_GATHER+1.0);x=lerp(270,CX,k);rolling=k<1;}
  if(rolling)bassTheta+=deltaTime/1000*3.6;
  const y=GROUND-BR+6;
  // 舞蹈:落拍撼动 + 每小节左右摆
  let dRot=0,dx=0;
  if(dancing(t)){dRot=radians(9*beatSway(t))+radians(4*beatHit(t))*0;dx=10*beatSway(t,1);}
  const rock=(t>=T_SHADES)?radians(4.5*sin((t-T_SHADES)*1.7)):0;   // 不倒翁
  const sq=1+0.05*beatHit(t)+0.02*(t>=T_SHADES?1:0);
  push();translate(x+dx,y);rotate(dRot+rock);scale(sq,1/sq);
  push();rotate(bassTheta);
  noStroke();
  fill(232,236,244);circle(0,0,BR*2.06);
  fill(150,110,74);circle(0,0,BR*2.0);
  fill(244,246,250);circle(0,0,BR*1.72);
  fill(206,214,226);for(let k=0;k<8;k++){const a=k*TWO_PI/8+0.4;circle(cos(a)*BR*0.93,sin(a)*BR*0.93,9);}
  pop();
  if(t>T_HEAD+0.2){ // 堆好后:身上煤扣 + 心口暖光
    const w=seg(t,T_HEAD,T_HEAD+0.6);
    fill(52,54,64,220*w);circle(0,BR*0.30,8);circle(0,BR*0.55,7);
    if(t>=T_SHADES){const pl=beatHit(t);fill(255,150,90,120*pl);circle(0,-BR*0.1,44+30*pl);}
  }
  pop();
}

// ================= 军鼓(脑袋) =================
function snarePos(t){
  if(t<T_HEAD){const k=seg(t,E_SNARE,E_SNARE+1.4);          // 蹦入
    let x=lerp(W+120,470,k),y=GROUND-32+hop((k*5)%1,50);
    if(t>E_SNARE+1.4&&t<T_BREAK){y=GROUND-32-14*beatHit(t);x=470+10*beatSway(t,1);}  // 原地弹跳
    return {x,y};}
  const k=seg(t,T_HEAD,T_HEAD+1.0);                         // 跳上头顶
  return {x:lerp(470,CX,k),y:lerp(GROUND-32,HEADY,k)+hop(k,110)};
}
function drawSnare(t){
  if(t<E_SNARE)return;
  const p=snarePos(t),w=104,h=58;
  const alive=t>=T_SHADES;
  const rock=(t>=T_SHADES)?radians(4.5*sin((t-T_SHADES)*1.7)):0;
  let rp=p;
  if(t>=T_SHADES){const dx=p.x-CX,dy=p.y-(GROUND+8);rp={x:CX+dx*cos(rock)-dy*sin(rock),y:(GROUND+8)+dx*sin(rock)+dy*cos(rock)};}
  push();translate(rp.x,rp.y);rotate(rock);
  if(dancing(t)&&t<T_HEAD)rotate(radians(8*beatSway(t,1)));
  const sq=1+0.12*beatHit(t);scale(sq,1/sq);
  noStroke();
  fill(140,80,54);rect(-w/2,-h/2,w,h,6);
  fill(160,94,62);rect(-w/2,-h/2,w,h*0.4,6);
  fill(214,206,190);rect(-w/2-3,-h/2-5,w+6,10,4);rect(-w/2-3,h/2-5,w+6,10,4);
  fill(238,234,222);ellipse(0,-h/2,w,18);
  if(t>T_HEAD+0.5){
    if(alive){
      // 墨镜(派对)
      if(t>=T_SHADES){const dp=seg(t,T_SHADES,T_SHADES+0.4);
        fill(30,34,44,255);rect(-26,-6,20,14,4);rect(6,-6,20,14,4);rect(-6,-2,12,3);
        fill(120,200,230,180*dp);rect(-24,-4,8,5,2);rect(8,-4,8,5,2);
        fill(238,150,120,120);ellipse(-34,12,13,8);ellipse(34,12,13,8);
      }else{
        fill(52,54,64);ellipse(-20,2,12,12);ellipse(20,2,12,12);
        fill(255,255,255,220);circle(-17,-1,3.4);circle(23,-1,3.4);
        fill(238,150,120,120);ellipse(-38,12,14,9);ellipse(38,12,14,9);
      }
    }else{stroke(52,54,64);strokeWeight(2.5);noFill();arc(-20,2,12,8,0.2,PI-0.2);arc(20,2,12,8,0.2,PI-0.2);}
  }
  pop();
}

// ================= 镲片(帽子) =================
function cymPos(t){
  if(t<T_HAT){const k=seg(t,E_CYM,E_CYM+1.4);              // 飞盘旋入
    let x=lerp(W+140,560,k),y=GROUND-26-70*sin(k*PI);
    let rot=-8, spin=(1-k)*16;
    if(t>E_CYM+1.4&&t<T_BREAK){rot=-8+12*sin(beatNum(t)*TWO_PI);y=GROUND-26-8*abs(sin(beatNum(t)*PI));} // 抖肩
    return {x,y,rot,spin};}
  const k=seg(t,T_HAT,T_HAT+1.0);                          // 飞上头顶当帽
  return {x:lerp(560,CX+14,k),y:lerp(GROUND-26,HATY,k)-64*sin(k*PI),rot:lerp(-8,-12,k),spin:(1-k)*10};
}
function drawCymbal(t){
  if(t<E_CYM)return;
  const p=cymPos(t);
  const rock=(t>=T_SHADES)?radians(4.5*sin((t-T_SHADES)*1.7)):0;
  let x=p.x,y=p.y,rot=p.rot;
  if(t>=T_HAT&&t>=T_SHADES){const dx=x-CX,dy=y-(GROUND+8);x=CX+dx*cos(rock)-dy*sin(rock);y=(GROUND+8)+dx*sin(rock)+dy*cos(rock);rot+=degrees(rock);}
  push();translate(x,y);rotate(radians(rot)+(p.spin?sin(t*20)*0.12:0));
  noStroke();
  fill(214,176,96);ellipse(0,0,120,34);
  fill(232,198,128);ellipse(0,-4,76,20);
  fill(248,222,150);ellipse(0,-7,26,10);
  if(t<T_BREAK&&t>=FIRST){const g=beatHit(t,2);if(g>0.4){noFill();stroke(255,232,170,150*g);strokeWeight(2);ellipse(0,0,132,42);}}
  pop();
}

// ================= 鼓棒小人 =================
function drawStickBody(){
  const L=90;
  noStroke();fill(150,108,70);
  beginShape();vertex(-7,0);vertex(-5,-L);vertex(5,-L);vertex(7,0);endShape(CLOSE);
  fill(214,170,120);
  beginShape();vertex(-5.4,0);vertex(-3.8,-L);vertex(3.8,-L);vertex(5.4,0);endShape(CLOSE);
  fill(220,176,128);ellipse(0,-L-9,22,20);
  fill(244,208,162);ellipse(-3,-L-13,10,7);
  fill(60,42,30);ellipse(-4,-L-9,5,5);ellipse(4,-L-9,5,5);
  fill(255,255,255,225);circle(-3,-L-10.3,1.6);circle(5,-L-10.3,1.6);
  fill(238,146,116,150);ellipse(-8,-L-5,5.5,3.5);ellipse(8,-L-5,5.5,3.5);
}
// A:左臂
function drawStickA(t){
  if(t<E_STICKS)return;
  let x,y,rot=0;
  if(t<T_ARMS-0.6){
    if(t<E_STICKS+1.4){const k=seg(t,E_STICKS,E_STICKS+1.4);x=lerp(-60,250,k);y=GROUND+8+hop((k*6)%1,26);} // 追跑入场
    else{ // 原地扭跳
      x=250+16*beatSway(t,1);y=GROUND+8+hop(((beatNum(t))%1+1)%1,22);rot=14*beatSway(t,1);}
  }else{const k=seg(t,T_ARMS-0.6,T_ARMS);x=lerp(250,CX-92,k);y=lerp(GROUND+8,GROUND-BR-24,k)+hop(k,50);rot=lerp(0,58,k);}
  const rock=(t>=T_SHADES)?radians(4.5*sin((t-T_SHADES)*1.7)):0;
  if(t>=T_ARMS){const dx=x-CX,dy=y-(GROUND+8);x=CX+dx*cos(rock)-dy*sin(rock);y=(GROUND+8)+dx*sin(rock)+dy*cos(rock);rot+=degrees(rock);}
  push();translate(x,y);rotate(radians(rot));drawStickBody();pop();
}
// B:右臂(镜像,错半拍)
function drawStickB(t){
  if(t<E_STICKS+0.22)return;
  let x,y,rot=0;
  if(t<T_ARMS+0.4){
    if(t<E_STICKS+1.62){const k=seg(t,E_STICKS+0.22,E_STICKS+1.62);x=lerp(-95,200,k);y=GROUND+8+hop((k*6)%1,26);}
    else{const bp=((beatNum(t)+0.5)%1+1)%1;x=200-16*beatSway(t,1);y=GROUND+8+hop(bp,22);rot=-14*beatSway(t,1);}
  }else{const k=seg(t,T_ARMS+0.4,T_ARMS+1.0);x=lerp(200,CX+92,k);y=lerp(GROUND+8,GROUND-BR-24,k)+hop(k,54);rot=lerp(0,-58,k);}
  const rock=(t>=T_SHADES)?radians(4.5*sin((t-T_SHADES)*1.7)):0;
  if(t>=T_ARMS+0.4){const dx=x-CX,dy=y-(GROUND+8);x=CX+dx*cos(rock)-dy*sin(rock);y=(GROUND+8)+dx*sin(rock)+dy*cos(rock);rot+=degrees(rock);}
  push();translate(x,y);rotate(radians(rot));drawStickBody();pop();
}

// ================= 派对亮片 =================
let confetti=[];
function partySparkle(t){
  if(confetti.length<40&&random()<0.4)
    confetti.push({x:random(W),y:-10,vx:random(-20,20),vy:random(60,120),
      c:[random(255),random(255),random(255)],r:random(4,8),age:0,rot:random(TWO_PI),vr:random(-4,4)});
  confetti=confetti.filter(c=>{c.age+=deltaTime/1000;c.x+=c.vx*deltaTime/1000;c.y+=c.vy*deltaTime/1000;c.rot+=c.vr*deltaTime/1000;return c.y<H+20;});
  for(const c of confetti){push();translate(c.x,c.y);rotate(c.rot);
    noStroke();fill(c.c[0],c.c[1],c.c[2],220);rect(-c.r/2,-c.r/2,c.r,c.r*0.6,1);pop();}
  // 墨镜反光 glint
}
</script>
</body>
</html>
